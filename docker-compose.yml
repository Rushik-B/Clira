services:
  app:
    build: .
    ports:
      - "13000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/clira
      DIRECT_URL: postgresql://postgres:postgres@db:5432/clira
      REDIS_URL: redis://redis:6379
      NEXTAUTH_URL: http://localhost:13000
      NEXT_PUBLIC_LANDING_PAGE_URL: ""
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: npm run start:worker
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/clira
      DIRECT_URL: postgresql://postgres:postgres@db:5432/clira
      REDIS_URL: redis://redis:6379
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: clira
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"
    volumes:
      - clira-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "16379:6379"
    volumes:
      - clira-redis:/data

volumes:
  clira-postgres:
  clira-redis:
