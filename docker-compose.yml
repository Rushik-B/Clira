services:
  app:
    build: .
    command: sh -c "npx prisma migrate deploy && npm run start"
    ports:
      - "13000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/clira
      DIRECT_URL: postgresql://postgres:postgres@db:5432/clira
      REDIS_URL: redis://redis:6379
      NEXTAUTH_URL: http://localhost:13000
      NEXT_PUBLIC_LANDING_PAGE_URL: ""
      GOOGLE_APPLICATION_CREDENTIALS: /app/google-service-account.json
      CLIRA_AI_TRACE_ENABLED: "true"
      CLIRA_AI_TRACE_DIR: /var/lib/clira/ai-traces
      CLIRA_AI_TRACE_CAPTURE: full
    volumes:
      - ./google-service-account.json:/app/google-service-account.json:ro
      - ./.clira-runtime:/var/lib/clira
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    command: sh -c "npm run start:worker"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/clira
      DIRECT_URL: postgresql://postgres:postgres@db:5432/clira
      REDIS_URL: redis://redis:6379
      GOOGLE_APPLICATION_CREDENTIALS: /app/google-service-account.json
      CLIRA_AI_TRACE_ENABLED: "true"
      CLIRA_AI_TRACE_DIR: /var/lib/clira/ai-traces
      CLIRA_AI_TRACE_CAPTURE: full
    volumes:
      - ./google-service-account.json:/app/google-service-account.json:ro
      - ./.clira-runtime:/var/lib/clira
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  backfill-worker:
    build: .
    command: sh -c "npm run start:backfill-worker"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/clira
      DIRECT_URL: postgresql://postgres:postgres@db:5432/clira
      REDIS_URL: redis://redis:6379
      GOOGLE_APPLICATION_CREDENTIALS: /app/google-service-account.json
      CLIRA_AI_TRACE_ENABLED: "true"
      CLIRA_AI_TRACE_DIR: /var/lib/clira/ai-traces
      CLIRA_AI_TRACE_CAPTURE: full
    volumes:
      - ./google-service-account.json:/app/google-service-account.json:ro
      - ./.clira-runtime:/var/lib/clira
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  gmail-pull-worker:
    build: .
    command: sh -c "npm run start:gmail-pull-worker"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/clira
      DIRECT_URL: postgresql://postgres:postgres@db:5432/clira
      REDIS_URL: redis://redis:6379
      GOOGLE_APPLICATION_CREDENTIALS: /app/google-service-account.json
      CLIRA_AI_TRACE_ENABLED: "true"
      CLIRA_AI_TRACE_DIR: /var/lib/clira/ai-traces
      CLIRA_AI_TRACE_CAPTURE: full
    volumes:
      - ./google-service-account.json:/app/google-service-account.json:ro
      - ./.clira-runtime:/var/lib/clira
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  cron:
    build: .
    command: sh -c "npm run start:cron"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      CRON_TARGET_BASE_URL: http://app:3000
      CRON_TIMEZONE: UTC
      GOOGLE_APPLICATION_CREDENTIALS: /app/google-service-account.json
      CLIRA_AI_TRACE_ENABLED: "true"
      CLIRA_AI_TRACE_DIR: /var/lib/clira/ai-traces
      CLIRA_AI_TRACE_CAPTURE: full
    volumes:
      - ./google-service-account.json:/app/google-service-account.json:ro
      - ./.clira-runtime:/var/lib/clira
    depends_on:
      app:
        condition: service_started

  db:
    # pgvector required for InboxSearchChunk.embedding (email search subagent semantic search)
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: clira
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"
    volumes:
      - clira-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clira"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "16379:6379"
    volumes:
      - clira-redis:/data

volumes:
  clira-postgres:
  clira-redis:
