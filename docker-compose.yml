services:
  app:
    build: .
    command: sh -c "npx prisma migrate deploy && npm run start"
    ports:
      - "13000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/clira
      DIRECT_URL: postgresql://postgres:postgres@db:5432/clira
      REDIS_URL: redis://redis:6379
      NEXTAUTH_URL: http://localhost:13000
      NEXT_PUBLIC_LANDING_PAGE_URL: ""
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    command: sh -c "npm run start:worker"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/clira
      DIRECT_URL: postgresql://postgres:postgres@db:5432/clira
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  cron:
    build: .
    command: sh -c "npm run start:cron"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      CRON_TARGET_BASE_URL: http://app:3000
      CRON_TIMEZONE: UTC
    depends_on:
      app:
        condition: service_started

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: clira
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"
    volumes:
      - clira-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clira"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "16379:6379"
    volumes:
      - clira-redis:/data

volumes:
  clira-postgres:
  clira-redis:
