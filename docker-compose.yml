x-shared-env: &shared-env
  env_file:
    - .env
  environment: &base-env
    NODE_ENV: production
    DATABASE_URL: postgresql://${CLIRA_DB_APP_USER:-clira_app}:${CLIRA_DB_APP_PASSWORD:-clira_app}@db:5432/clira
    DIRECT_URL: postgresql://${CLIRA_DB_APP_USER:-clira_app}:${CLIRA_DB_APP_PASSWORD:-clira_app}@db:5432/clira
    REDIS_URL: redis://redis:6379
    NEXTAUTH_URL: ${APP_PUBLIC_URL:-http://localhost:13000}
    NEXT_PUBLIC_LANDING_PAGE_URL: ${APP_LANDING_PAGE_URL:-}
    GOOGLE_APPLICATION_CREDENTIALS: /var/lib/clira/google-service-account.json
    CLIRA_AI_TRACE_ENABLED: "true"
    CLIRA_AI_TRACE_DIR: /var/lib/clira/ai-traces
    CLIRA_AI_TRACE_CAPTURE: full
  volumes:
    - ./.clira-runtime:/var/lib/clira

services:
  app:
    profiles: ["core"]
    image: ${CLIRA_IMAGE:-ghcr.io/rushik-b/clira:main}
    pull_policy: always
    command: sh -c "npx prisma migrate deploy && npm run start"
    ports:
      - "13000:3000"
    <<: *shared-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    profiles: ["core"]
    image: ${CLIRA_IMAGE:-ghcr.io/rushik-b/clira:main}
    pull_policy: always
    command: sh -c "npm run start:worker"
    <<: *shared-env
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_started

  backfill-worker:
    profiles: ["backfill"]
    image: ${CLIRA_IMAGE:-ghcr.io/rushik-b/clira:main}
    pull_policy: always
    command: sh -c "npm run start:backfill-worker"
    <<: *shared-env
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_started

  gmail-pull-worker:
    profiles: ["core"]
    image: ${CLIRA_IMAGE:-ghcr.io/rushik-b/clira:main}
    pull_policy: always
    command: sh -c "npm run start:gmail-pull-worker"
    <<: *shared-env
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_started

  cron:
    profiles: ["core"]
    image: ${CLIRA_IMAGE:-ghcr.io/rushik-b/clira:main}
    pull_policy: always
    command: sh -c "npm run start:cron"
    <<: *shared-env
    environment:
      <<: *base-env
      CRON_TARGET_BASE_URL: http://app:3000
      CRON_TIMEZONE: UTC
    depends_on:
      app:
        condition: service_started

  db:
    profiles: ["core", "backfill"]
    # pgvector required for InboxSearchChunk.embedding (email search subagent semantic search)
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: clira
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      CLIRA_DB_APP_USER: ${CLIRA_DB_APP_USER:-clira_app}
      CLIRA_DB_APP_PASSWORD: ${CLIRA_DB_APP_PASSWORD:-clira_app}
    ports:
      - "15432:5432"
    volumes:
      - clira-postgres:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clira"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    profiles: ["core", "backfill"]
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "16379:6379"
    volumes:
      - clira-redis:/data

volumes:
  clira-postgres:
  clira-redis:
